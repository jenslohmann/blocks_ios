name: Blocks
options:
  bundleIdPrefix: com.blocks
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
  TARGETED_DEVICE_FAMILY: "1,2"   # 1 = iPhone, 2 = iPad

targets:
  Blocks:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Blocks
    resources:
      - path: Blocks/Resources/Assets.xcassets
      - path: Blocks/Resources/Localisation
      - path: Blocks/Resources/Sounds
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.blocks.app
      INFOPLIST_FILE: Blocks/Resources/Info.plist
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      TARGETED_DEVICE_FAMILY: "1,2"
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      SWIFT_EMIT_LOC_STRINGS: YES

  BlocksTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BlocksTests
    dependencies:
      - target: Blocks
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.blocks.tests
      GENERATE_INFOPLIST_FILE: YES

